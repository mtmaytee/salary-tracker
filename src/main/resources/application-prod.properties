# ===================================================================
# 🌍 DATABASE CONNECTION (PRODUCTION ENGINE - AIVEN MY SQL)
# ===================================================================

# 1. ลิงก์เชื่อมต่อไปยังระบบ Cloud
spring.datasource.url=jdbc:mysql://mysql-salary-salary-tracker.e.aivencloud.com:22267/defaultdb?ssl-mode=REQUIRED&useSSL=true&allowPublicKeyRetrieval=true

# 2. ชื่อผู้ดูแลระบบหลัก
spring.datasource.username=avnadmin

# 3. รหัสผ่านจริง (แนะนำให้ตั้งใน Render Environment Variables)
spring.datasource.password=${DB_PASSWORD}

# Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000

# ===================================================================
# ⚙️ HIBERNATE & JPA CONFIGURATION
# ===================================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# App Configuration
app.backend-url=${APP_BACKEND_URL}
app.frontend-url=${APP_FRONTEND_URL}
app.jwt.secret=${JWT_SECRET:9a4f2c3d5e6f7g8h9i0j1k2l3m4n5o6p7q8r9s0t1u2v3w4x5y6z7A8B9C0D1E2F}

# Email Configuration (Production)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true