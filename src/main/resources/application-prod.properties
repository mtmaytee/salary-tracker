# ===================================================================
# 🌍 DATABASE CONNECTION (PRODUCTION ENGINE - AIVEN MY SQL)
# ===================================================================

# 1. ลิงก์เชื่อมต่อไปยังระบบ Cloud (ดึงค่า Host และ Port จากหน้าจอของคุณ)
spring.datasource.url=jdbc:mysql://mysql-salary-salary-tracker.e.aivencloud.com:22267/defaultdb?ssl-mode=REQUIRED

# 2. ชื่อผู้ดูแลระบบหลักที่ Aiven กำหนดให้
spring.datasource.username=avnadmin

# 3. รหัสผ่านจริง (ให้กดไอคอนรูป "ดวงตา" บนหน้าเว็บคุณ แล้วเอารหัสมาวางแทนที่ตรงนี้)
spring.datasource.password=${DB_PASSWORD}

# ===================================================================
# ⚙️ HIBERNATE & JPA CONFIGURATION
# ===================================================================
# สั่งให้ Hibernate ตรวจสอบและสร้างตาราง (Users, IncomeRecord, ActivityLog)
# ขึ้นบนระบบคลาวด์ให้อัตโนมัติเมื่อแอปพลิเคชันสตาร์ทติด
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true