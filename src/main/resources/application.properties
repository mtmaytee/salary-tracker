spring.application.name=salary-tracker

spring.datasource.url=jdbc:mysql://localhost:3312/salary-tracker
spring.datasource.username=root
spring.datasource.password=admin
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Bangkok

# ตั้งชื่อ Pool เพื่อให้ตรวจสอบง่ายใน Log
spring.datasource.hikari.pool-name=SalaryTrackerPool
# จำนวน Connection ขั้นต่ำที่เปิดรอไว้
spring.datasource.hikari.minimum-idle=5
# จำนวน Connection สูงสุดที่ยอมให้มีได้
spring.datasource.hikari.maximum-pool-size=10
# ระยะเวลาสูงสุดที่ยอมให้รอนาน (มิลลิวินาที) ก่อนจะตัด Error
spring.datasource.hikari.connection-timeout=30000
# ระยะเวลาสูงสุดที่ Connection จะคงอยู่ได้
spring.datasource.hikari.max-lifetime=1800000

